name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      target:
        description: 'Which platforms to build'
        required: true
        default: 'both'
        type: choice
        options:
          - both
          - windows
          - mac

jobs:
  build-mac:
    if: github.event_name != 'workflow_dispatch' || github.event.inputs.target == 'both' || github.event.inputs.target == 'mac'
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - run: cp electron/google-calendar-config.example.js electron/google-calendar-config.js

      - run: npm run dist:mac

      - uses: actions/upload-artifact@v4
        with:
          name: mac-builds
          path: release/*.dmg

  build-win:
    if: github.event_name != 'workflow_dispatch' || github.event.inputs.target == 'both' || github.event.inputs.target == 'windows'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - run: cp electron/google-calendar-config.example.js electron/google-calendar-config.js

      - run: npm run dist:win

      - uses: actions/upload-artifact@v4
        with:
          name: win-builds
          path: release/*.exe

  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: [build-mac, build-win]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/mac-builds/*.dmg
            artifacts/win-builds/*.exe
          generate_release_notes: true
